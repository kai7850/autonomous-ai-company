version: '3.9'
services:
  redis:
    image: redis:latest
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: ai_company
  api:
    build: .
    command: uvicorn api.routes:app --host 0.0.0.0 --port 8000
    volumes: [".:/app"]
    depends_on: [redis, postgres]
  worker:
    build: .
    command: celery -A workers.worker.celery_app worker --loglevel=info
    volumes: [".:/app"]
    depends_on: [redis, postgres]
